<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LaiBE - PlanCraft Bridge 攔截演習</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined" rel="stylesheet" />
    <style>
        body { font-family: sans-serif; padding: 40px; }
        .test-controls { margin-top: 20px; display: flex; gap: 10px; }
    </style>
</head>
<body class="bg-gray-50">

    <div class="max-w-3xl mx-auto space-y-8">
        <header>
            <h1 class="text-2xl font-bold text-slate-800">PlanCraft Bridge 攔截演習場</h1>
            <p class="text-slate-500">測試預算生成權限的強制攔截與解鎖邏輯</p>
        </header>

        <!-- 代表畫布的區塊 -->
        <div id="plancraft-container" class="w-full h-[400px] bg-white border-2 border-dashed border-slate-300 flex items-center justify-center text-slate-400 rounded-xl">
            <div class="text-center">
                <span class="material-symbols-outlined text-4xl mb-2">architecture</span>
                <p>PlanCraft 繪圖區 (待載入引擎...)</p>
            </div>
        </div>

        <!-- 受監控的決策按鈕 -->
        <div class="flex justify-between items-center p-6 bg-white rounded-xl shadow-sm border border-slate-100">
            <span class="text-sm font-medium text-slate-500">當前狀態：等待數據輸入</span>
            <button id="next-btn" class="px-8 py-3 bg-[#2C3E50] text-white rounded-lg font-bold transition-all shadow-md">
                下一步：預算生成
            </button>
        </div>

        <hr class="border-slate-200">

        <!-- 演習觸發器 -->
        <div class="space-y-4">
            <h2 class="text-sm font-black text-slate-400 uppercase tracking-widest">演習觸發器 (模擬 PlanCraft 輸出)</h2>
            <div class="test-controls">
                <button onclick="simulatePlanCraft(false)" class="px-6 py-2 bg-red-100 text-red-700 border border-red-200 rounded-md hover:bg-red-200 transition-colors font-bold">
                    [測試] 模擬傳入：幾何未閉合 (isClosed: false)
                </button>
                <button onclick="simulatePlanCraft(true)" class="px-6 py-2 bg-green-100 text-green-700 border border-green-200 rounded-md hover:bg-green-200 transition-colors font-bold">
                    [測試] 模擬傳入：幾何已閉合 (isClosed: true)
                </button>
            </div>
        </div>
    </div>

    <!-- 引入橋接腳本 -->
    <script src="src/plancraft_bridge.js"></script>
    <script>
        // 模擬 PlanCraft 數據回傳
        function simulatePlanCraft(isClosed) {
            console.log(`[演習] 模擬 PlanCraft 回報: isClosed = ${isClosed}`);
            validatePlanCraftSchema({
                boundaries: [],
                isClosed: isClosed
            });
        }
    </script>
</body>
</html>
