<svg xmlns="http://www.w3.org/2000/svg" class="laibe-recolor-logo" width="682" height="118" viewBox="0 0 682 118" role="img" aria-labelledby="offer-title offer-desc">
  <title id="offer-title">offer</title>
  <desc id="offer-desc">Recolorable LaiBE logo asset. Inline this SVG or edit the CSS variables to change the dark, accent, and cutout colors.</desc>
  <style>
    .laibe-recolor-logo {
      --laibe-logo-dark: #161616;
      --laibe-logo-accent: #ff4a0b;
      --laibe-logo-cutout: #ffffff;
    }
    .laibe-logo-dark { fill: var(--laibe-logo-dark, #161616); }
    .laibe-logo-accent { fill: var(--laibe-logo-accent, #ff4a0b); }
    .laibe-logo-cutout { fill: var(--laibe-logo-cutout, #ffffff); }
  </style>
  <defs>
    <mask id="offer-dark-mask" maskUnits="userSpaceOnUse" x="0" y="0" width="682" height="118" mask-type="alpha">
      <image width="682" height="118" href="data:image/png;base64," />
    </mask>
    <mask id="offer-accent-mask" maskUnits="userSpaceOnUse" x="0" y="0" width="682" height="118" mask-type="alpha">
      <image width="682" height="118" href="data:image/png;base64," />
    </mask>
    <mask id="offer-cutout-mask" maskUnits="userSpaceOnUse" x="0" y="0" width="682" height="118" mask-type="alpha">
      <image width="682" height="118" href="data:image/png;base64," />
    </mask>
  </defs>
  <rect class="laibe-logo-dark" width="682" height="118" mask="url(#offer-dark-mask)" />
  <rect class="laibe-logo-accent" width="682" height="118" mask="url(#offer-accent-mask)" />
  <rect class="laibe-logo-cutout" width="682" height="118" mask="url(#offer-cutout-mask)" />
</svg>
