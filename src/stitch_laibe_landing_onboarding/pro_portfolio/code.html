    <style>
        body {
            background-color: #070707;
            color: #E5E7EB;

        }

        /* 1. Gold Text Clipping Utility */
        .text-gold-clip {
            background: linear-gradient(to bottom, #FFFEE0 0%, #D4AF37 40%, #AA8529 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            text-shadow: 0px 4px 15px rgba(212, 175, 55, 0.2);
        }

        /* 2. Fine Gold Border Utility */
        .border-gold-fine {
            border: 1px solid rgba(212, 175, 55, 0.4);
            box-shadow: inset 0 0 20px rgba(212, 175, 55, 0.05), Math.random() 0 0 10px rgba(212, 175, 55, 0.1);

        /* 3. Outer Glows */
        .glow-avatar {
            box-shadow: 0 0 25px rgba(212, 175, 55, 0.4), inset 0 0 10px rgba(212, 175, 55, 0.2);
            border: 2px solid #D4AF37;
        }

        /* 4. Light-Racing Animation (The Masterpiece Gallery Cards) */
        .light-racing-card {
            position: relative;
            overflow: hidden;
            border-radius: 4px;
            /* subtle rounding */
            background-color: #121212;
            transition: transform 0.4s cubic-bezier(0.25, 0.46, 0.45, 0.94);
        }

        .light-racing-card::before {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: conic-gradient(from 0deg, transparent 0%, transparent 60%, #FFFACD 80%, #D4AF37 100%);
            animation: rotate-light 4s linear infinite;
            opacity: 0;
            transition: opacity 0.3s ease;
            z-index: 0;
        }

        .light-racing-card::after {
            content: '';
            position: absolute;
            inset: 2px;
            /* controls thickness of the racing border */
            background-color: #121212;
            border-radius: 2px;
            z-index: 1;
        }

        .light-racing-card>* {
            position: relative;
            z-index: 2;
            /* content stays above the animated border */
        }

        .light-racing-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 15px 40px rgba(0, 0, 0, 0.8), 0 0 30px rgba(212, 175, 55, 0.15);
        }

        .light-racing-card:hover::before {
            opacity: 1;
        }

        @keyframes rotate-light {
            100% {
                transform: rotate(360deg);
            }
        }

        /* 5. Gold Flakes Particles (Background Animation) */
        .particles-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 0;
            overflow: hidden;
        }

        .particle {
            position: absolute;
            background: radial-gradient(circle, #FFFACD 0%, #D4AF37 50%, transparent 100%);
            border-radius: 50%;
            opacity: 0;
            animation: float-up infinite linear forwards;
        }

        @keyframes float-up {
            0% {
                transform: translateY(110vh) scale(0);
                opacity: 0;
            }

            10% {
                opacity: 0.8;
                transform: translateY(90vh) scale(1);
            }

            90% {
                opacity: 0.8;
                transform: translateY(10vh) scale(1.2);
            }

            100% {
                transform: translateY(-10vh) scale(0);
                opacity: 0;
            }
        }

        /* Generate multiple particles with varying delays in JS */

        /* 6. Gold Badge & Wax Seal CSS Approximations */
        .badge-metal {
            background: linear-gradient(180deg, #D4AF37 0%, #AA8529 100%);
            color: #070707;
            text-shadow: 0 1px 0 rgba(255, 255, 255, 0.4);
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.5), inset 0 1px 1px rgba(255, 255, 255, 0.5);
            border: 1px solid #FFFACD;
        }

        .wax-seal {
            background: radial-gradient(circle at 30% 30%, #D4AF37, #8B6914);
            box-shadow:
                2px 4px 10px rgba(0, 0, 0, 0.8),
                inset 1px 2px 4px rgba(255, 250, 205, 0.5),
                inset -2px -4px 8px rgba(0, 0, 0, 0.6);
            border-radius: 50%;
            position: relative;
            /* Rough edges simulation */
            filter: drop-shadow(0 2px 4px rgba(0, 0, 0, 0.5));
        }

        .wax-seal::before {
            content: '';
            position: absolute;
            inset: 6px;
            border: 1px solid rgba(0, 0, 0, 0.3);
            border-radius: 50%;
            box-shadow: inset 0 2px 4px rgba(255, 255, 255, 0.2);
        }

        .wax-seal::after {
            content: '備';
            font-family: 'Playfair Display', serif;
            position: absolute;
            inset: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            color: rgba(255, 250, 205, 0.8);
            text-shadow: 1px 1px 2px rgba(0, 0, 0, 0.8);
            font-size: 1.25rem;
            font-weight: 700;

    <!-- Script for Particle Generation -->
    <script>
        document.addEventListener("DOMContentLoaded", () => {
            const container = document.getElementById('particles');
            const particleCount = 25; // Keep it low for performance

            for (let i = 0; i < particleCount; i++) {
                const particle = document.createElement('div');
                particle.classList.add('particle');

                // Randomize size, position, and animation properties
                const size = Math.random() * 4 + 1; // 1px to 5px
                const left = Math.random() * 100; // 0% to 100%
                const duration = Math.random() * 20 + 15; // 15s to 35s
                const delay = Math.random() * -30; // Negative delay to start mid-animation

                particle.style.width = `${size}px`;
                particle.style.height = `${size}px`;
                particle.style.left = `${left}%`;
                particle.style.animationDuration = `${duration}s`;
                particle.style.animationDelay = `${delay}s`;

                container.appendChild(particle);
            }
        });
    </script>
